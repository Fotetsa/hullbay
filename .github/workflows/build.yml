name: Build & Publish

on:
  push:
    branches: [release]

# Publie les images vers GHCR (lecture publique). Pas d'input non fiable utilisé
# dans les run: (cf. guide injection workflow) — seules les métadonnées docker/metadata.
permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [api, web]
    steps:
      - uses: actions/checkout@v6

      - name: Login GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Variables (version auto + sha court)
        id: vars
        run: |
          echo "SHA=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          echo "VERSION=1.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Métadonnées (tags / labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.package }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.vars.outputs.VERSION }}
            type=raw,value=${{ steps.vars.outputs.SHA }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/${{ matrix.package }}/Dockerfile
          builder: ${{ steps.buildx.outputs.name }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
